name: build-docker-image

on:
  push:
    branches:
      - "main"
      - "staging"
      - "production"
    paths-ignore:
      - '**.md'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for provenance
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: set RUBY_VERSION
        run: echo "RUBY_VERSION=$(cat .ruby-version | tr -d '\n')" >> "$GITHUB_OUTPUT"
        id: ruby_version

      - uses: docker/setup-buildx-action@v4

      # Generate tags based on git context
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Branch name
            type=ref,event=branch
            # Git short SHA
            type=sha,prefix=
            # edge
            type=edge,branch=main
            # Latest on default branch
            type=raw,value=latest,enable={{is_default_branch}}

      # Build locally first (don't push yet)
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true # Load into local Docker
          build-args: |
            RUBY_VERSION=${{ steps.ruby_version.outputs.RUBY_VERSION }}-slim
          tags: myapp:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan with Trivy
      - name: Scan image
        id: scan
        uses: anchore/scan-action@v7
        with:
          image: "myapp:scan"
          fail-build: true
          severity-cutoff: critical

      - name: upload Anchore scan SARIF report
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

      # Push only if scan passes
      - name: Login and push
        if: success()
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: success()
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Generate SLSA provenance
          provenance: true
          # Generate Software Bill of Materials
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
