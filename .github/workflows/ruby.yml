name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      HANAMI_ENV: test
      TZ: Europe/Berlin
      FNOX_PROFILE: ci
      FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: jdx/mise-action@v4 # Installs fnox via mise
      # Decrypt dev secrets for testing
      - name: Setup fnox
        env:
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
        run: |
          # Use the CI age key to decrypt secrets
          echo "FNOX_AGE_KEY is already set from secrets"
          fnox ls
#      - name: Set up Ruby
#        uses: ruby/setup-ruby@v1
#        with:
#          bundler-cache: true
      - name: Prepare env
        run: cp .env-example .env
      - name: install rmagick
        run: apt-get update && apt-get install imagemagick libmagickcore-dev libmagickwand-dev
      - name: Install gems
        run: bundle install
      - name: Prepare database
        run: fnox exec -P ci -- bundle exec hanami db prepare -e test
      - name: npm install
        run: npm install
      - name: Run all tests
        run: fnox exec -P ci -- bundle exec rake ci
